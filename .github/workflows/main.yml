name: Mobile Automation CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install and Start Appium Server
        run: |
          # Install stable Appium 2
          npm install -g appium@2.5.1 
          
          # Install a compatible version of the uiautomator2 driver (not the v3-beta one)
          appium driver install uiautomator2@2.45.1
          
          # Start Appium in the background
          appium --log appium.log &

      - name: Run Tests in Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim -memory 4096
          working-directory: ./mobile-automation
          script: |
            adb wait-for-device
            # Wait until the package manager is actually ready
            while [ "`adb shell getprop sys.boot_completed | tr -d '\r'`" != "1" ] ; do sleep 5; done
            mvn clean test