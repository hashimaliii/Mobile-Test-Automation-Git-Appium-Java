name: Mobile Automation CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest 
    strategy:
      matrix:
        api-level: [29]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install and Start Appium Server
        run: |
          npm install -g appium@2.5.1 
          appium driver install uiautomator2@2.45.1
          appium --allow-insecure adb_shell --log appium.log &
          # Wait for Appium to be fully ready
          sleep 10

      - name: Run Tests in Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: default
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-boot-timeout: 600
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim -no-snapshot-save -memory 2048
          script: |
            adb wait-for-device
            # Wait for boot completion
            while [ "`adb shell getprop sys.boot_completed | tr -d '\r'`" != "1" ] ; do sleep 5; done
            
            # Prepare device
            adb shell input keyevent KEYCODE_WAKEUP
            adb shell input keyevent 82
            
            mvn clean test

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ExtentReport-${{ matrix.api-level }}
          path: target/ExtentReport.html
