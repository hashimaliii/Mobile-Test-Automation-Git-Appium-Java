# NGINX Reverse Proxy Configuration for Appium
# Use this to expose Appium server remotely with security
# Place in nginx/conf.d/ directory

upstream appium_backend {
    server appium-server:4723;
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=appium_limit:10m rate=10r/s;

# HTTP to HTTPS redirect (if using SSL)
server {
    listen 80;
    server_name _;
    return 301 https://$server_name$request_uri;
}

# HTTPS server (optional - requires SSL certificate)
server {
    listen 443 ssl http2;
    server_name appium.example.com;
    
    # SSL Configuration (replace with your certificates)
    # ssl_certificate /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Logging
    access_log /var/log/nginx/appium_access.log;
    error_log /var/log/nginx/appium_error.log warn;
    
    # Proxy configuration
    location / {
        # Rate limiting
        limit_req zone=appium_limit burst=20 nodelay;
        
        # Proxy headers
        proxy_pass http://appium_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (for Appium server)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Timeouts
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
    
    # Health check endpoint
    location /health {
        proxy_pass http://appium_backend/wd/hub/status;
        access_log off;
    }
    
    # Deny access to sensitive paths
    location ~ /(admin|config|private) {
        return 403;
    }
}

# HTTP server (without SSL redirect)
server {
    listen 8080;
    server_name _;
    
    access_log /var/log/nginx/appium_access.log;
    error_log /var/log/nginx/appium_error.log warn;
    
    location / {
        # Rate limiting
        limit_req zone=appium_limit burst=20 nodelay;
        
        # Proxy configuration
        proxy_pass http://appium_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        
        # Timeouts
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}
