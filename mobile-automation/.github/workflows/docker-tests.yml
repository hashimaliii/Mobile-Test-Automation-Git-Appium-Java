# CI/CD Pipeline for Mobile Appium Tests with Docker

name: Mobile Test Automation with Docker

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-
    
    - name: Build Docker image
      run: |
        docker build -t appium-test:${{ github.sha }} .
        docker tag appium-test:${{ github.sha }} appium-test:latest
    
    - name: Run tests in Docker
      run: |
        docker-compose up --abort-on-container-exit --exit-code-from appium-server
      timeout-minutes: 30
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: target/surefire-reports/
        retention-days: 30
    
    - name: Upload test report to artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: surefire-html-report
        path: target/surefire-reports/emailable-report.html
    
    - name: Publish test results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: target/surefire-reports/TEST-*.xml
        check_name: Test Results
    
    - name: Store coverage reports
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: target/site/
        retention-days: 30
    
    - name: Comment PR with test summary
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          const testResults = `Test Results available at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: testResults
          });
    
    - name: Clean up
      if: always()
      run: |
        docker-compose down -v || true
        docker rmi appium-test:${{ github.sha }} || true

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build -t appium-test:scan .
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'appium-test:scan'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  lint-dockerfile:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Lint Dockerfile
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: Dockerfile
        ignore: DL3008,DL3009
