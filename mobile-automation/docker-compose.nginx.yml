# Docker Compose with NGINX Reverse Proxy
# For exposing Appium server remotely with security and rate limiting

version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: appium-nginx
    
    restart: unless-stopped
    
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/appium.conf:ro
      # Uncomment for SSL certificates
      # - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    
    depends_on:
      - appium-server
    
    networks:
      - appium-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  appium-server:
    image: appium-test:latest
    container_name: appium-test
    
    restart: unless-stopped
    
    environment:
      - APPIUM_HOST=0.0.0.0
      - APPIUM_PORT=4723
      - APPIUM_LOG_LEVEL=info
    
    volumes:
      - ./src:/workspace/src:ro
      - ./app:/workspace/app:ro
      - ./target:/workspace/target
      - appium-data:/opt/appium
    
    networks:
      - appium-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4723/wd/hub/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

volumes:
  appium-data:
    driver: local

networks:
  appium-network:
    driver: bridge
