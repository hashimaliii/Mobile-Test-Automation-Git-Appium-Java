version: '3.8'

# Docker Compose for Android Emulator with Appium
# Requires KVM support and Linux host
# For macOS/Windows: Use cloud-based Appium services or nested virtualization

services:
  android-emulator:
    image: android-emulator:latest
    container_name: android-emulator
    environment:
      - EMULATOR_DEVICE=pixel_4
      - ANDROID_API_LEVEL=33
      - ANDROID_ARCH=x86_64
    volumes:
      - android-data:/root/.android
    ports:
      - "5554:5554"
      - "5555:5555"
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    devices:
      - /dev/kvm
    networks:
      - appium-network

  appium-server:
    image: appium-test:latest
    container_name: appium-server
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - android-emulator
    environment:
      - APPIUM_HOST=0.0.0.0
      - APPIUM_PORT=4723
      - ANDROID_SDK_ROOT=/opt/android-sdk
      - ANDROID_HOME=/opt/android-sdk
      - JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    volumes:
      - ./src:/workspace/src
      - ./app:/workspace/app
      - ./target:/workspace/target
    ports:
      - "4723:4723"
    networks:
      - appium-network
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4723/wd/hub/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  android-data:
    driver: local

networks:
  appium-network:
    driver: bridge
